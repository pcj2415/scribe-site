<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Confirmed — Scribe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background-color: #000000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #ffffff;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px 24px;
  }
  .logo {
    width: 200px;
    max-width: 62vw;
    height: auto;
    margin-bottom: 40px;
  }
  .check {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid #CBBA84;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
  }
  .check svg { width: 32px; height: 32px; }
  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.2px;
    margin-bottom: 14px;
    color: #ffffff;
  }
  p {
    font-size: 16px;
    line-height: 1.6;
    color: #cfcfcf;
    max-width: 340px;
    margin: 0 auto;
  }
  .hint {
    margin-top: 28px;
    font-size: 14px;
    color: #8a8a8a;
  }
  .foot {
    margin-top: 48px;
    font-size: 12px;
    color: #6a6a6a;
  }
  .foot a { color: #6a6a6a; text-decoration: underline; }
</style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="https://scribetrading.com/email-logo.png" alt="Scribe">

    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 13l4 4L19 7" stroke="#CBBA84" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1>Email Confirmed</h1>
    <p>Your email has been verified. You can now return to the Scribe app and sign in to start journaling your trades.</p>

    <div class="hint">You can close this window and open Scribe.</div>

    <div class="foot">
      Scribe &middot; O5na Labs LLC<br>
      <a href="https://scribetrading.com">scribetrading.com</a>
    </div>
  </div>
</body>
</html>
